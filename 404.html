














































<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.12);
            padding: 50px;
            border-radius: 20px;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 90px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 14px 28px;
            background: white;
            color: #1e3c72;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .button:hover {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>404</h1>

        <h2>Oops! Page Not Found</h2>

        <p>
            Hi there! The page you are looking for is currently unavailable
            or may have been moved.
            <br><br>
            We are working to improve your experience and will be back soon.
        </p>

        <a href="index.html" class="button">
            Return to Home
        </a>
    </div>

</body>
</html>
